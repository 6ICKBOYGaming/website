<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THOCK KING - Modern Gaming Gear</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="app-header">
        <div class="header-container">
            <h1 class="logo"><i class="fa-solid fa-gamepad"></i> THOCK KING</h1>
            <button id="adminBtn" class="icon-btn"><i class="fa-solid fa-circle-user"></i> แอดมิน</button>
        </div>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="พิมพ์ชื่อสินค้า หรือรุ่นที่ต้องการค้นหา...">
            <button id="clearSearchBtn" class="clear-btn hidden">&times;</button>
        </div>
        
        <div class="category-nav" id="categoryNav"></div>
    </header>

    <main class="main-content">
        <div id="searchStatus" class="search-status hidden"></div>
        <div id="productGrid" class="product-grid"></div>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeLogin">&times;</span>
            <h3><i class="fa-solid fa-lock"></i> เข้าสู่ระบบแอดมิน</h3>
            <form id="loginForm" style="margin-top: 15px;">
                <div class="input-group">
                    <label>อีเมลผู้ใช้</label>
                    <input type="email" id="username" autocomplete="username" placeholder="admin@email.com" required>
                </div>
                <div class="input-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 5px;">ยืนยันเข้าสู่ระบบ</button>
            </form>
        </div>
    </div>

    <div id="adminModal" class="modal-full">
        <div class="admin-header">
            <h2><i class="fa-solid fa-sliders"></i> ระบบหลังบ้านหลังร้าน</h2>
            <button id="logoutBtn" class="btn btn-danger" style="width: auto;">ออกจากระบบ</button>
        </div>
        
        <div class="admin-body">
            <div class="admin-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3><i class="fa-solid fa-list"></i> จัดการหมวดหมู่สินค้า</h3>
                    <button type="button" id="saveCatOrderBtn" class="btn btn-success hidden" style="width: auto; padding: 6px 12px; font-size: 0.8rem;"><i class="fa-solid fa-floppy-disk"></i> บันทึกลำดับหมวดหมู่</button>
                </div>
                <div class="category-manager-list" id="adminCategoryList"></div>

                <div style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 15px;">
                    <h4 id="catFormTitle" style="font-size: 0.85rem; margin-bottom: 10px; color: var(--text-main);">➕ เพิ่มหมวดหมู่สินค้าใหม่</h4>
                    <form id="categoryForm" style="display: flex; gap: 10px;">
                        <input type="hidden" id="catId">
                        <input type="text" id="catName" placeholder="ชื่อหมวดหมู่ เช่น คีย์บอร์ด" required style="flex-grow:1; padding: 10px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; outline:none;">
                        <button type="submit" id="catSubmitBtn" class="btn btn-success" style="width: auto;">บันทึก</button>
                        <button type="button" id="catCancelBtn" class="btn btn-secondary hidden" style="width: auto;">ยกเลิก</button>
                    </form>
                </div>
            </div>

            <div class="admin-card">
                <h3 id="formTitle">เพิ่มสินค้าใหม่</h3>
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="input-group">
                        <label>ชื่อสินค้า</label>
                        <input type="text" id="prodName" required>
                    </div>
                    <div class="input-group">
                        <label>หมวดหมู่สินค้า</label>
                        <select id="prodCategory" required></select>
                    </div>
                    <div class="input-group">
                        <label>URL รูปภาพสินค้า</label>
                        <input type="url" id="prodImg" required>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>ราคาปกติ (บาท)</label>
                            <input type="number" id="prodPrice" required>
                        </div>
                        <div class="input-group">
                            <label>ราคาส่วนลด (บาท - เว้นว่างถ้าไม่มี)</label>
                            <input type="number" id="prodDiscountPrice">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>รายละเอียดสินค้า</label>
                        <textarea id="prodDesc" rows="3" required></textarea>
                    </div>
                    <div class="input-group">
                        <label>ลิงค์ Shopee 1 (หลัก)</label>
                        <input type="url" id="prodShopee1" placeholder="https://...">
                    </div>
                    <div class="input-group">
                        <label>ลิงค์ Shopee 2</label>
                        <input type="url" id="prodShopee2" placeholder="https://...">
                    </div>
                    <div class="input-group">
                        <label>ลิงค์ Lazada</label>
                        <input type="url" id="prodLazada" placeholder="https://...">
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button type="submit" id="submitProdBtn" class="btn btn-success">บันทึกข้อมูลสินค้า</button>
                        <button type="button" id="cancelEditBtn" class="btn btn-secondary hidden">ยกเลิกการแก้ไข</button>
                    </div>
                </form>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 15px 0;">
                <h3 class="section-title" style="margin: 0;">จัดเรียงและรายการสินค้าทั้งหมด (ลากเพื่อสลับตำแหน่งขึ้นก่อน-หลัง)</h3>
                <button type="button" id="saveProdOrderBtn" class="btn btn-success hidden" style="width: auto; padding: 10px 18px;"><i class="fa-solid fa-floppy-disk"></i> บันทึกลำดับสินค้า</button>
            </div>
            <div id="adminProductGrid" class="product-grid admin-view"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
