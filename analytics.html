<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard สถิติข้อมูลเชิงลึก</title>
    <link rel="stylesheet" href="style.css"> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { padding: 30px; font-family: sans-serif; background-color: #0f172a; color: #f8fafc; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 16px; }
        .stat-card p { margin: 0; font-size: 36px; font-weight: bold; color: #38bdf8; }
        .chart-section { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 40px; }
        select { background: #0f172a; color: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid #475569; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-panel">
        <div>
            <h1 style="color: #00ffff; margin: 0;">📊 แผงควบคุมสถิติข้อมูลเชิงลึก</h1>
            <p style="color: #94a3b8; margin: 5px 0 0 0;">รวบรวมพฤติกรรมและการเข้าใช้งานของลูกค้าบนเว็บไซต์</p>
        </div>
        <div>
            <label for="dateSelect" style="margin-right: 10px; color: #cbd5e1;">เลือกดูรายวัน:</label>
            <select id="dateSelect">
                </select>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>จำนวนครั้งที่หน้าเว็บถูกเปิดใช้งาน (Page Views)</h3>
            <p id="txtPageViews">0</p>
        </div>
        <div class="stat-card">
            <h3>ผู้เข้าใช้งานที่ไม่ซ้ำหน้า (Unique Users)</h3>
            <p id="txtUniqueUsers" style="color: #10b981;">0</p>
        </div>
    </div>

    <div class="chart-section">
        <h3 style="margin-top: 0; color: #f1f5f9; margin-bottom: 20px;">📈 ช่วงเวลาที่มีการเข้าใช้งานมากที่สุด (แยกตามชั่วโมง)</h3>
        <div style="position: relative; height:400px; width:100%;">
            <canvas id="hourlyTrafficChart"></canvas>
        </div>
    </div>
</div>

<script type="module" src="analytics.js"></script>
</body>
</html>
