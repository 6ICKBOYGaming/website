<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ ระบบจัดการ Keyword สินค้าพร้อมกัน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .btn-admin-yellow { background-color: #f59e0b; color: #1e293b; transition: all 0.2s; }
        .btn-admin-yellow:hover { background-color: #d97706; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-6">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-amber-400 flex items-center gap-2">⚙️ ระบบจัดการคีย์เวิร์ด (Bulk Update)</h1>
                <p class="text-slate-400 text-xs md:text-sm">เลือกสินค้าหลายๆ ชิ้นเพื่อแก้ไข คีย์เวิร์ด พร้อมกันในทีเดียว</p>
            </div>
            <button class="btn-admin-yellow" style="padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold;" onclick="window.location.href='index.html'">
                ⬅️ กลับหน้าหลัก
            </button>
        </div>

        <div class="bg-slate-800 border border-slate-700 p-5 rounded-xl mb-6 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">1. เลือกหมวดหมู่สินค้า</label>
                    <select id="filterCategory" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-amber-500 text-sm">
                        <option value="ทั้งหมด">ทั้งหมด</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-amber-400 text-sm font-medium mb-2">2. ระบุ Keywords ใหม่ที่ต้องการเปลี่ยน</label>
                    <div class="flex gap-2">
                        <input type="text" id="newKeywordsInput" placeholder="เช่น Mice, coming soon, เมาส์เกมมิ่ง (คั่นด้วยเครื่องหมายจุลภาค , )" 
                               class="flex-1 px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-amber-500 text-sm text-slate-100">
                        <button id="bulkUpdateBtn" class="btn-admin-yellow" style="padding: 10px 25px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold;">
                            🚀 อัปเดตพร้อมกัน
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden shadow-xl">
            <div class="p-4 bg-slate-700/50 flex justify-between items-center border-b border-slate-700">
                <span class="text-sm text-slate-300 font-medium" id="selectedCountText">เลือกแล้ว 0 ชิ้น</span>
                <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer select-none">
                    <input type="checkbox" id="selectAllCheckbox" class="w-4 h-4 rounded accent-amber-500"> เลือกทั้งหมดในหน้านี้
                </label>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-900/60 text-slate-400 border-b border-slate-700">
                            <th class="p-4 w-12 text-center">เลือก</th>
                            <th class="p-4">รูป / ชื่อสินค้า</th>
                            <th class="p-4 w-32">หมวดหมู่</th>
                            <th class="p-4">Keywords ปัจจุบัน</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody" class="divide-y divide-slate-700/60">
                        <tr>
                            <td colspan="4" class="p-8 text-center text-slate-500">กำลังดึงข้อมูลสินค้าทั้งหมดจากระบบ...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="keyword.js"></script>
</body>
</html>
