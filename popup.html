<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการป๊อปอัพโปรโมชัน (Admin)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0b0c;
            color: #f5f5f7;
        }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-[#121214] border border-[#222226] rounded-2xl p-6 shadow-xl">
        <div class="flex items-center justify-between border-b border-[#222226] pb-4 mb-6">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                <span>📢</span> จัดการ Popup โปรโมชันหน้าแรก
            </h1>
            <a href="index.html" class="text-sm text-gray-400 hover:text-white transition">← กลับหน้าร้าน</a>
        </div>

        <div class="space-y-6">
            <div class="flex items-center justify-between bg-[#161619] p-4 rounded-xl border border-[#222226]">
                <div>
                    <label class="font-semibold block text-white">สถานะการแสดงผล</label>
                    <span class="text-xs text-gray-400">เปิด หรือ ปิด การเด้งโชว์ Popup ที่หน้าแรกของเว็บไซต์</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="popupActive" class="sr-only peer">
                    <div class="w-14 h-7 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-500"></div>
                </label>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">URL รูปภาพโฆษณา (แนะนำสัดส่วน 1:1 ขนาด 400x400px)</label>
                <input type="url" id="popupImgUrl" placeholder="https://example.com/image.jpg" 
                    class="w-full bg-[#1c1c1f] border border-[#222226] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gray-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">ลิงก์ปลายทางเมื่อลูกค้าคลิกที่รูปภาพ (เช่น หน้าสินค้า หรือ Shopee/Lazada)</label>
                <input type="url" id="popupTargetUrl" placeholder="https://shopee.co.th/..." 
                    class="w-full bg-[#1c1c1f] border border-[#222226] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gray-500 transition">
            </div>

            <div class="bg-[#161619] p-4 rounded-xl border border-[#222226] flex flex-col items-center">
                <span class="text-xs text-gray-400 mb-3 block self-start">ตัวอย่างการแสดงผล (Live Preview 1:1):</span>
                <div class="w-[300px] h-[300px] bg-[#1c1c1f] rounded-lg border border-[#222226] flex items-center justify-center overflow-hidden relative" id="previewContainer">
                    <img id="popupPreview" src="" alt="ยังไม่มีรูปภาพ" class="w-full h-full object-cover hidden">
                    <span id="previewPlaceholder" class="text-gray-500 text-sm">กรอก URL รูปภาพเพื่อดูตัวอย่าง</span>
                </div>
            </div>

            <button id="savePopupBtn" class="w-full bg-white text-[#0b0b0c] font-bold py-3.5 rounded-xl hover:bg-gray-200 transition flex items-center justify-center gap-2">
                💾 บันทึกการตั้งค่าระบบ Popup
            </button>
        </div>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
